<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>KTalk Packet Inspector</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="popup">
      <h1>KTalk Packet Inspector</h1>
      <p id="status">Проверка активной вкладки...</p>
      <div class="actions">
        <button id="toggle">Подключить захват</button>
        <button id="openInspector">Открыть журнал</button>
        <button id="clearLog">Очистить журнал</button>
      </div>
      <p class="hint">
        Захват работает только на доменах <code>*.ktalk.ru</code> и использует Chrome Debugger API для websocket и HTTP событий.
      </p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
  </html>
