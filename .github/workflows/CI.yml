name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: auto
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: auto
          - runner: ubuntu-22.04
            target: armv7
            manylinux: auto
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: musllinux_1_2
          - runner: ubuntu-22.04
            target: aarch64
            manylinux: musllinux_1_2
          - runner: ubuntu-22.04
            target: armv7
            manylinux: musllinux_1_2
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Set Package Version From Tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["VERSION"]
          cargo_toml = pathlib.Path("Cargo.toml")
          text = cargo_toml.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update Cargo.toml version")
          cargo_toml.write_text(updated, encoding="utf-8")
          print(f"Using package version {version}")
          PY
        env:
          VERSION: ${{ github.ref_name }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.platform.manylinux }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}-${{ matrix.platform.manylinux }}-py${{ matrix.python-version }}
          path: dist
          retention-days: 3

